<svg width="400" height="260" viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 16px; font-weight: 600; fill: var(--vscode-editor-foreground, #cccccc); }
    .label { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 12px; fill: var(--vscode-descriptionForeground, #888888); }
    .highlight { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 11px; font-weight: 500; fill: var(--vscode-button-foreground, #ffffff); }
    .card { fill: var(--vscode-sideBar-background, #252526); stroke: var(--vscode-panel-border, #3c3c3c); stroke-width: 1; rx: 6; }
    .btn { fill: var(--vscode-button-background, #0e639c); rx: 4; }
    .icon-color { fill: var(--vscode-textLink-foreground, #3794ff); }
    .dim { fill: var(--vscode-descriptionForeground, #888888); }
  </style>

  <!-- RTT Card -->
  <rect x="30" y="40" width="150" height="100" class="card"/>
  <text x="55" y="72" class="title">J-Link RTT</text>
  <text x="55" y="92" class="label">Debug probe</text>
  <text x="55" y="108" class="label">Real-time transfer</text>
  <text x="55" y="124" class="label">HCI decoding</text>

  <!-- UART Card -->
  <rect x="220" y="40" width="150" height="100" class="card"/>
  <text x="245" y="72" class="title">Serial UART</text>
  <text x="245" y="92" class="label">USB CDC ACM</text>
  <text x="245" y="108" class="label">UART bridge</text>
  <text x="245" y="124" class="label">Any baud rate</text>

  <!-- Arrow -->
  <text x="190" y="95" class="dim" font-size="18">or</text>

  <!-- Connect button -->
  <rect x="120" y="170" width="160" height="32" class="btn"/>
  <text x="160" y="191" class="highlight">Connect Device</text>

  <!-- Hint -->
  <text x="118" y="230" class="label">Choose your transport to get started</text>
</svg>
