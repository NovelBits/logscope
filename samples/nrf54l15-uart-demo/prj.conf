# LogScope UART Demo — nRF54L15 DK
# Logging over UART for testing LogScope serial transport
# Build: west build -b nrf54l15dk/nrf54l15/cpuapp samples/nrf54l15-uart-demo --build-dir build-uart -p
# Flash: west flash --build-dir build-uart
# Serial port: /dev/ttyACM* (115200 baud)

# Logging over UART
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MAX_LEVEL=4
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_RTT=n
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_RTT_CONSOLE=n

# Stack size (needed for burst logging)
CONFIG_MAIN_STACK_SIZE=4096
