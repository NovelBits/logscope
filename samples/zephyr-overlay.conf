# Devscope: Minimal Kconfig for RTOS tracing (optional)
# Add these to your prj.conf to enable RTOS events in Devscope

# Basic logging (usually already enabled)
CONFIG_LOG=y

# RTOS tracing via SystemView (optional — adds RTOS events to Devscope)
